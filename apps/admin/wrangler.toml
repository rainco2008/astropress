name = "astropress"
main = "./dist/_worker.js/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Serves static assets from dist/ and SSR from _worker.js
[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "404-page"

[build]
command = "pnpm --filter @astropress/admin run deploy:cf"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "astropress"
database_id = "00000000-0000-0000-0000-000000000001"

[[r2_buckets]]
binding = "R2"
bucket_name = "astropress-media"
