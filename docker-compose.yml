version: "3.9"

services:
  astropress:
    build:
      context: .
      target: runner
    ports:
      - "4321:4321"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./data/astropress.db}
      AUTH_SECRET: ${AUTH_SECRET:-changeme-use-a-long-random-string}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
