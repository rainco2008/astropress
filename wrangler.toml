# Cloudflare Pages config for AstroPress
# Single deployment — admin + public frontend served from one Pages project.
# Deploy via: npx wrangler pages deploy apps/admin/dist

name = "astropress"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/admin/dist"

[[d1_databases]]
binding = "DB"
database_name = "astropress"
database_id = "00000000-0000-0000-0000-000000000001"

[[r2_buckets]]
binding = "R2"
bucket_name = "astropress-media"

[vars]
# No SITE_URL needed — admin and public frontend are the same origin.
