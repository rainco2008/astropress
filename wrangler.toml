# Cloudflare Pages config for astropress-admin
# This file is read from the repo root by Cloudflare Pages Git integration.
#
# Web app (astropress-web) is a separate Pages project — configure it in the
# Cloudflare dashboard with the settings in apps/web/wrangler.toml.

name = "astropress-admin"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/admin/dist"

[[d1_databases]]
binding = "DB"
database_name = "astropress"
database_id = "00000000-0000-0000-0000-000000000001"

[[r2_buckets]]
binding = "R2"
bucket_name = "astropress-media"

[vars]
SITE_URL = "https://your-admin.pages.dev"
