name = "astropress"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/admin/dist"

[build]
command = "ASTRO_ADAPTER=cloudflare pnpm install --frozen-lockfile && pnpm build --filter @astropress/admin"

[[d1_databases]]
binding = "DB"
database_name = "astropress"
database_id = "PASTE_YOUR_DATABASE_ID_HERE"

[[r2_buckets]]
binding = "R2"
bucket_name = "astropress-media"
